<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel | Pup A Coffee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
:root{
--espresso:#2B1B1B;
--gold:#F0CB3C;
--cream:#FAF9F6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
display:flex;
min-height:100vh;
background:linear-gradient(#fffdf9,#f5efe6);
color:var(--espresso);
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* SIDEBAR */
.sidebar{
width:260px;
background:var(--espresso);
color:white;
padding:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.sidebar h2{
font-family:"DM Serif Display",serif;
font-size:1.8rem;
margin-bottom:10px;
}

.sidebar a{
color:white;
text-decoration:none;
padding:12px;
border-radius:12px;
transition:.25s;
cursor:pointer;
}

.sidebar a:hover{
background:rgba(255,255,255,.12);
transform:translateX(5px);
}

.logout:hover{
background:red !important;
color:white;
}

/* MAIN */
.main{
flex:1;
padding:35px;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topbar h1{
font-family:"DM Serif Display",serif;
font-size:2.3rem;
}

.badge{
background:var(--gold);
padding:6px 14px;
border-radius:999px;
font-weight:600;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.07);
}

/* SECTIONS */
.page{
display:none;
}

.page.active{
display:block;
animation:fade .3s ease;
}

/* PANEL */
.panel{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.07);
margin-top:12px;
}

/* BUTTON */
.btn{
background:var(--gold);
border:none;
padding:10px 14px;
border-radius:999px;
cursor:pointer;
font-weight:600;
margin:5px;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
}

/* STAFF LIST */
.staff-item{
border:1px solid #eee;
padding:12px;
border-radius:12px;
margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
.sidebar{display:none;}
.cards{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>Pup A Coffee</h2>
<div id="roleText" style="opacity:.7;font-size:.85rem;">Loading...</div>

<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('orders')">Orders</a>
<a onclick="show('tickets')">Tickets</a>
<a onclick="show('staff')">Staff</a>
<a onclick="show('settings')">Settings</a>

<a class="logout" onclick="logout()">Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h1 id="welcome">Welcome</h1>
<div class="badge">Online</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<div class="cards">
<div class="card">System Active</div>
<div class="card">Orders: --</div>
<div class="card">Tickets: --</div>
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
<div class="panel">No orders yet.</div>
</div>

<!-- TICKETS -->
<div id="tickets" class="page">
<div class="panel">No tickets yet.</div>
</div>

<!-- STAFF -->
<div id="staff" class="page">

<button class="btn" onclick="hireStaff()">Hire Staff</button>
<button class="btn" onclick="viewStaff()">View Staff</button>

<div id="staffList"></div>

</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<div class="panel">Master admin settings coming soon.</div>
</div>

</div>

<script>
let staffDB = JSON.parse(localStorage.getItem("staffDB")) || [];

const user = localStorage.getItem("user");
const role = localStorage.getItem("role");

if(!user){
window.location.href="login.html";
}

function getStaff(){
return staffDB.find(s => s.username === user);
}

const current = getStaff();

if(current){
document.getElementById("welcome").innerText = "Welcome, " + current.first;
document.getElementById("roleText").innerText = "Role: " + current.role;
}else{
document.getElementById("welcome").innerText = "Welcome, " + user;
document.getElementById("roleText").innerText = "Role: " + (role || "user");
}

/* NAV */
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

/* LOGOUT */
function logout(){
if(confirm("Are you sure you want to logout?")){
localStorage.clear();
window.location.href="login.html";
}
}

/* HIRE STAFF */
function hireStaff(){

const first = prompt("First Name:");
if(!first) return;

const last = prompt("Last Name:");
if(!last) return;

const middle = prompt("Middle Name (optional):") || "";
const username = prompt("Username:");
const password = prompt("Password:");
const role = prompt("Role (staff / manager / admin):", "staff");

staffDB.push({
id:Date.now(),
first,
last,
middle,
username,
password,
role:role || "staff"
});

localStorage.setItem("staffDB", JSON.stringify(staffDB));

alert("Staff account created.");
}

/* VIEW STAFF */
function viewStaff(){

const container = document.getElementById("staffList");
container.innerHTML = "";

staffDB.forEach((s,i)=>{

container.innerHTML += `
<div class="staff-item">
<strong>${s.first} ${s.middle ? s.middle+" " : ""}${s.last}</strong><br>
Username: ${s.username}<br>
Role: ${s.role}<br>

<button class="btn" onclick="editStaff(${i})">Edit</button>
<button class="btn" onclick="deleteStaff(${i})">Delete</button>
</div>
`;

});

}

/* EDIT */
function editStaff(i){

let s = staffDB[i];

let first = prompt("First Name", s.first);
let last = prompt("Last Name", s.last);
let role = prompt("Role", s.role);

staffDB[i] = {...s, first, last, role};

localStorage.setItem("staffDB", JSON.stringify(staffDB));
viewStaff();
}

/* DELETE (SELF PROTECTION) */
function deleteStaff(i){

if(staffDB[i].username === user){
alert("You cannot delete your own account.");
return;
}

if(confirm("Delete this staff member?")){
staffDB.splice(i,1);
localStorage.setItem("staffDB", JSON.stringify(staffDB));
viewStaff();
}

}
</script>

</body>
</html>
