<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Pup A Coffee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--espresso:#2B1B1B;
--gold:#F0CB3C;
--cream:#FAF9F6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#fffdf9,#f7f0e6,#fff,#f5efe6);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.blob{
position:absolute;
width:300px;
height:300px;
background:rgba(240,203,60,.25);
filter:blur(60px);
border-radius:50%;
animation:float 8s infinite ease-in-out;
}

.blob.one{top:-50px;left:-80px;}
.blob.two{bottom:-80px;right:-60px;background:rgba(43,27,27,.15);}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(40px);}
}

.box{
position:relative;
z-index:10;
width:360px;
padding:45px;
border-radius:22px;
background:rgba(255,255,255,.75);
backdrop-filter:blur(18px);
box-shadow:0 20px 60px rgba(0,0,0,.15);
text-align:center;
animation:fadeIn .8s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h2{
font-size:28px;
margin-bottom:20px;
color:var(--espresso);
}

p{
font-size:13px;
opacity:.6;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid rgba(0,0,0,.1);
outline:none;
transition:.3s;
background:white;
}

input:focus{
border-color:var(--gold);
box-shadow:0 0 0 4px rgba(240,203,60,.25);
transform:scale(1.02);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:999px;
background:var(--gold);
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(240,203,60,.4);
}

/* MESSAGE */
.msg{
margin-top:12px;
font-size:13px;
font-weight:600;
}

.error{color:#d62828;}
.success{color:#2a9d8f;}

/* ICON STYLE */
.msg img{
width:14px;
vertical-align:middle;
margin-right:6px;
}

/* SHAKE */
.shake{
animation:shake .4s;
}

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-4px);}
}

small{
display:block;
margin-top:15px;
opacity:.5;
font-size:12px;
}
</style>
</head>

<body>

<div class="blob one"></div>
<div class="blob two"></div>

<div class="box" id="card">

<h2>Employee Login</h2>
<p>Welcome back to Pup A Coffee</p>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">

<button onclick="doLogin()">Sign In</button>

<div class="msg" id="msg"></div>

<small>Secure Staff Access Only</small>

</div>

<script>
let attempts = 0;
const maxAttempts = 5;

// ICONS
const errorIcon = `<img src="https://icons.veryicon.com/png/o/miscellaneous/ui-designer-icon/invalid-object.png">`;
const successIcon = `<img src="https://icons.veryicon.com/png/o/miscellaneous/ui-designer-icon/user-information-12.png">`;

// MASTER LOGIN
const MASTER_USER = "tyharrison296";
const MASTER_PASS = "tyler123";

function doLogin(){

const card = document.getElementById("card");
const msg = document.getElementById("msg");

const u = document.getElementById("u").value;
const p = document.getElementById("p").value;

if(!u || !p){
card.classList.add("shake");
setTimeout(()=>card.classList.remove("shake"),400);
return;
}

// ✅ SUCCESS LOGIN
if(u === MASTER_USER && p === MASTER_PASS){

msg.className = "msg success";
msg.innerHTML = `${successIcon} Login Approved Redirecting...`;

localStorage.setItem("user", u);
localStorage.setItem("role", "masteradmin");

setTimeout(()=>{
window.location.href = "admin.html";
},800);

return;
}

// ❌ FAIL LOGIN
attempts++;

msg.className = "msg error";
msg.innerHTML = `${errorIcon} Invalid Login Attempt ${attempts}/${maxAttempts}`;

card.classList.add("shake");
setTimeout(()=>card.classList.remove("shake"),400);

if(attempts >= maxAttempts){
msg.innerHTML = `${errorIcon} Too many attempts. Please try again later.`;
document.querySelector("button").disabled = true;
}
}
</script>

</body>
</html>
